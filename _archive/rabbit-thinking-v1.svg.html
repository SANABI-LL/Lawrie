<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>my-pet · 像素兔 · thinking</title>
<style>
  /*
    像素兔桌宠 · thinking 状态（A 类：循环）
    ─────────────────────────────────────────────
    复用站立兔图谱，叠加思考表现：
      · 眼睛上瞟 + 微挑眉 + 小嘴 + 腮红
      · 头右上 "..." 点点点一个个冒出来
      · 然后思考泡泡涨出来，里面是个【胡萝卜问号】（橙身绿缨的 ?）
      · 整段循环；兔子轻轻呼吸
    整像素、硬边、跳帧。改 THINK_SPRITE 即改造型。
  */

  :root { --pixel-size: 360px; --bg: #20283A; }

  html, body { margin: 0; min-height: 100vh; background: var(--bg); }
  body { display: grid; min-height: 100vh; place-items: center;
         font-family: "VT323", "Press Start 2P", ui-monospace, monospace; }
  #stage { width: var(--pixel-size); height: var(--pixel-size);
           image-rendering: pixelated; shape-rendering: crispEdges; display: block; }

  /* 轻轻呼吸 */
  #bunny { transform-box: fill-box; transform-origin: center bottom;
           animation: breathe 3.6s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.02)} }

  /* "..." 点点点一个个冒 */
  #dot1 { animation: d1 5s infinite; }
  #dot2 { animation: d2 5s infinite; }
  #dot3 { animation: d3 5s infinite; }
  @keyframes d1 { 0%{opacity:0} 6%{opacity:1} 82%{opacity:1} 90%{opacity:0} 100%{opacity:0} }
  @keyframes d2 { 0%,14%{opacity:0} 20%{opacity:1} 82%{opacity:1} 90%{opacity:0} 100%{opacity:0} }
  @keyframes d3 { 0%,28%{opacity:0} 34%{opacity:1} 82%{opacity:1} 90%{opacity:0} 100%{opacity:0} }

  /* 思考泡泡涨出来 + 胡萝卜问号浮现 */
  #bubble { transform-box: fill-box; transform-origin: 50% 100%; animation: bub 5s infinite; }
  @keyframes bub {
    0%,40%   { opacity:0; transform: scale(0.3); }
    54%      { opacity:1; transform: scale(1.06); }
    60%,82%  { opacity:1; transform: scale(1); }
    90%,100% { opacity:0; transform: scale(1); }
  }
  #carrotQ { animation: cq 5s infinite; }
  @keyframes cq { 0%,54%{opacity:0} 62%{opacity:1} 82%{opacity:1} 90%,100%{opacity:0} }

  #hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
          font-size: 16px; color: #6E7DA8; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="hint">my-pet · 像素兔 · thinking（在想萝卜呢）</div>

<svg id="stage" viewBox="0 0 28 28" role="img" aria-label="一只在思考、头上冒出胡萝卜问号的像素兔桌宠" xmlns="http://www.w3.org/2000/svg">
  <rect id="shadow" x="8" y="26" width="12" height="1" fill="#000000" opacity="0.2"/>

  <!-- 兔子 -->
  <g id="bunny">
    <g id="body"></g>
    <!-- 脸：微挑眉 + 上瞟眼 + 小嘴 + 腮红 -->
    <g id="face">
      <rect x="10" y="11" width="2" height="1" fill="#3C2E28"/><rect x="15" y="11" width="2" height="1" fill="#3C2E28"/>
      <rect x="10" y="12" width="2" height="1" fill="#3C2E28"/><rect x="15" y="12" width="2" height="1" fill="#3C2E28"/>
      <rect x="13" y="16" width="2" height="1" fill="#D88A93"/>
      <rect x="8"  y="15" width="1" height="1" fill="#F48C96"/><rect x="19" y="15" width="1" height="1" fill="#F48C96"/>
    </g>
    <!-- 口袋萝卜缨 -->
    <g id="pocket">
      <rect x="13" y="20" width="1" height="1" fill="#7FBF4F"/><rect x="14" y="20" width="1" height="1" fill="#4E8A33"/>
      <rect x="11" y="21" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="21" width="4" height="1" fill="#EADBC6"/><rect x="16" y="21" width="1" height="1" fill="#5A4A3F"/>
      <rect x="11" y="22" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="22" width="4" height="1" fill="#EADBC6"/><rect x="16" y="22" width="1" height="1" fill="#5A4A3F"/>
    </g>
  </g>

  <!-- 思考组：点点点 + 泡泡(胡萝卜问号) -->
  <g id="think">
    <rect id="dot1" x="18" y="12" width="1" height="1" fill="#E8F0F8" opacity="0"/>
    <rect id="dot2" x="20" y="10" width="1" height="1" fill="#E8F0F8" opacity="0"/>
    <rect id="dot3" x="22" y="9"  width="1" height="1" fill="#E8F0F8" opacity="0"/>

    <g id="bubble" opacity="0">
      <!-- 填充 -->
      <rect x="23" y="1" width="2" height="1" fill="#E8F0F8"/>
      <rect x="22" y="2" width="4" height="1" fill="#E8F0F8"/>
      <rect x="21" y="3" width="6" height="1" fill="#E8F0F8"/>
      <rect x="21" y="4" width="6" height="1" fill="#E8F0F8"/>
      <rect x="21" y="5" width="6" height="1" fill="#E8F0F8"/>
      <rect x="22" y="6" width="4" height="1" fill="#E8F0F8"/>
      <rect x="23" y="7" width="2" height="1" fill="#E8F0F8"/>
      <!-- 描边 -->
      <rect x="23" y="0" width="2" height="1" fill="#B8CCE0"/>
      <rect x="22" y="1" width="1" height="1" fill="#B8CCE0"/><rect x="25" y="1" width="1" height="1" fill="#B8CCE0"/>
      <rect x="21" y="2" width="1" height="1" fill="#B8CCE0"/><rect x="26" y="2" width="1" height="1" fill="#B8CCE0"/>
      <rect x="20" y="3" width="1" height="1" fill="#B8CCE0"/><rect x="27" y="3" width="1" height="1" fill="#B8CCE0"/>
      <rect x="20" y="4" width="1" height="1" fill="#B8CCE0"/><rect x="27" y="4" width="1" height="1" fill="#B8CCE0"/>
      <rect x="20" y="5" width="1" height="1" fill="#B8CCE0"/><rect x="27" y="5" width="1" height="1" fill="#B8CCE0"/>
      <rect x="21" y="6" width="1" height="1" fill="#B8CCE0"/><rect x="26" y="6" width="1" height="1" fill="#B8CCE0"/>
      <rect x="22" y="7" width="1" height="1" fill="#B8CCE0"/><rect x="25" y="7" width="1" height="1" fill="#B8CCE0"/>
      <rect x="23" y="8" width="2" height="1" fill="#B8CCE0"/>
      <!-- 胡萝卜问号(橙身绿缨的 ?) -->
      <g id="carrotQ" opacity="0">
        <rect x="23" y="1" width="1" height="1" fill="#7FBF4F"/><rect x="24" y="1" width="1" height="1" fill="#4E8A33"/>
        <rect x="22" y="2" width="1" height="1" fill="#C96A22"/><rect x="23" y="2" width="2" height="1" fill="#F0913C"/><rect x="25" y="2" width="1" height="1" fill="#C96A22"/>
        <rect x="25" y="3" width="1" height="1" fill="#F0913C"/>
        <rect x="24" y="4" width="1" height="1" fill="#F0913C"/><rect x="25" y="4" width="1" height="1" fill="#C96A22"/>
        <rect x="24" y="5" width="1" height="1" fill="#F0913C"/>
        <rect x="24" y="7" width="1" height="1" fill="#C96A22"/>
      </g>
    </g>
  </g>
</svg>

<script>
  /* ─── 站立兔图谱（整只下移2行·肚子缩短）。眼/嘴/腮红/口袋另叠。28×28。 ─── */
  const THINK_SPRITE = [
    "............................",
    "............................",
    "............................",
    "........OWWWO..OWWWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWWWO..OWWWO........",
    "........OWWWO..OWWWO........",
    "......OOWWWWWWWWWWWWOO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OOWWWWWWWWWWWWOO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWBBBBBBBBWWWO......",
    "......OWWWWBBBBBBWWWWO......",
    "......OOWWWWWWWWWWWWOO......",
    "........OWWWO..OWWWO........",
    "........OOOOO..OOOOO........",
    "............................",
    "............................"
  ];
  const PALETTE = { O:"#5A4A3F", W:"#F5EFE4", P:"#F4A7B6", B:"#FFFBF4" };

  const SVGNS = "http://www.w3.org/2000/svg";
  const bodyG = document.getElementById("body");
  THINK_SPRITE.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const c = row[x];
      if (c === "." || !PALETTE[c]) continue;
      const r = document.createElementNS(SVGNS, "rect");
      r.setAttribute("x", x); r.setAttribute("y", y);
      r.setAttribute("width", 1); r.setAttribute("height", 1);
      r.setAttribute("fill", PALETTE[c]);
      bodyG.appendChild(r);
    }
  });
</script>

</body>
</html>
