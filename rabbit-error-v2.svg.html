<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>my-pet · 像素兔 · error v2（撞上bug）</title>
<style>
  /*
    像素兔桌宠 · error v2（出错·撞上 bug，A 类循环）
    ─────────────────────────────────────────────
    与 rabbit-error.svg.html 并存对比。两处加强：
      · 金星前后两份拷贝 → 转到头后被真正遮挡、转到前面露出，层级永远正确（不再穿模）
      · 时不时 glitch：抽搐 + 红青错位闪一下，像撞上 bug
      · XX 晕眼 + 小呆嘴 + 冷汗
    整像素、硬边、跳帧。
  */
  :root { --pixel-size: 360px; --bg: #20283A; }
  html, body { margin: 0; min-height: 100vh; background: var(--bg); }
  body { display: grid; min-height: 100vh; place-items: center;
         font-family: "VT323", ui-monospace, monospace; }
  #stage { width: var(--pixel-size); height: var(--pixel-size);
           image-rendering: pixelated; shape-rendering: crispEdges; display: block; }

  /* 整场景偶发抽搐（glitch jitter） */
  #scene { animation: jitter 2.4s steps(1,end) infinite; }
  @keyframes jitter {
    0%,84% { transform: translateX(0); }
    85%    { transform: translateX(2px); }
    87%    { transform: translateX(-2px); }
    89%    { transform: translateX(1px); }
    91%    { transform: translateX(-1px); }
    93%,100% { transform: translateX(0); }
  }

  /* 红青错位幽灵：平时透明，glitch 时闪 */
  #ghostR, #ghostC { animation: ghostFlick 2.4s steps(1,end) infinite; }
  @keyframes ghostFlick {
    0%,84% { opacity: 0; }
    85%    { opacity: 0.6; }
    88%    { opacity: 0.3; }
    90%    { opacity: 0.6; }
    93%,100% { opacity: 0; }
  }

  /* 金星绕头椭圆轨道（中心 13,9 · rx7 · ry2）。前/后拷贝靠 vis 切换层级 */
  .starF { animation: orbit 1.5s linear infinite, frontVis 1.5s linear infinite; }
  .starB { animation: orbit 1.5s linear infinite, backVis  1.5s linear infinite; }
  #s2f, #s2b { animation-delay: -0.5s, -0.5s; }
  #s3f, #s3b { animation-delay: -1s, -1s; }
  @keyframes orbit {
    0%    { transform: translate(20px, 9px); }
    12.5% { transform: translate(18px, 10px); }
    25%   { transform: translate(13px, 11px); }
    37.5% { transform: translate(8px,  10px); }
    50%   { transform: translate(6px,  9px); }
    62.5% { transform: translate(8px,  8px); }
    75%   { transform: translate(13px, 7px); }
    87.5% { transform: translate(18px, 8px); }
    100%  { transform: translate(20px, 9px); }
  }
  @keyframes frontVis { 0%,49.9%{opacity:1} 50%,100%{opacity:0} }
  @keyframes backVis  { 0%,49.9%{opacity:0} 50%,100%{opacity:1} }

</style>
</head>
<body>


<svg id="stage" viewBox="0 0 28 28" role="img" aria-label="一只出错晕倒、画面 glitch、头顶金星绕圈的像素兔桌宠" xmlns="http://www.w3.org/2000/svg">
  <rect id="shadow" x="8" y="26" width="12" height="1" fill="#000000" opacity="0.2"/>

  <g id="scene">
    <!-- 红青错位幽灵（身体剪影，平时透明） -->
    <g id="ghostR" transform="translate(-2 0)" opacity="0"></g>
    <g id="ghostC" transform="translate(2 0)" opacity="0"></g>

    <!-- 后拷贝金星（在兔子后面，转到头后被真正挡住） -->
    <g id="starsBack">
      <g class="starB" id="s1b"><rect x="0" y="-1" width="1" height="1" fill="#E0AA28"/><rect x="-1" y="0" width="1" height="1" fill="#E0AA28"/><rect x="0" y="0" width="1" height="1" fill="#FFF4C2"/><rect x="1" y="0" width="1" height="1" fill="#E0AA28"/><rect x="0" y="1" width="1" height="1" fill="#E0AA28"/></g>
      <g class="starB" id="s2b"><rect x="0" y="-1" width="1" height="1" fill="#FFE48A"/><rect x="-1" y="0" width="1" height="1" fill="#FFE48A"/><rect x="0" y="0" width="1" height="1" fill="#FFF4C2"/><rect x="1" y="0" width="1" height="1" fill="#FFE48A"/><rect x="0" y="1" width="1" height="1" fill="#FFE48A"/></g>
      <g class="starB" id="s3b"><rect x="0" y="-1" width="1" height="1" fill="#E0AA28"/><rect x="-1" y="0" width="1" height="1" fill="#E0AA28"/><rect x="0" y="0" width="1" height="1" fill="#FFF4C2"/><rect x="1" y="0" width="1" height="1" fill="#E0AA28"/><rect x="0" y="1" width="1" height="1" fill="#E0AA28"/></g>
    </g>

    <!-- 兔子本体 + 晕脸 + 口袋 -->
    <g id="bunny">
      <g id="body"></g>
      <g id="face">
        <rect x="10" y="12" width="1" height="1" fill="#3C2E28"/><rect x="12" y="12" width="1" height="1" fill="#3C2E28"/><rect x="11" y="13" width="1" height="1" fill="#3C2E28"/><rect x="10" y="14" width="1" height="1" fill="#3C2E28"/><rect x="12" y="14" width="1" height="1" fill="#3C2E28"/>
        <rect x="15" y="12" width="1" height="1" fill="#3C2E28"/><rect x="17" y="12" width="1" height="1" fill="#3C2E28"/><rect x="16" y="13" width="1" height="1" fill="#3C2E28"/><rect x="15" y="14" width="1" height="1" fill="#3C2E28"/><rect x="17" y="14" width="1" height="1" fill="#3C2E28"/>
        <rect x="13" y="17" width="2" height="1" fill="#3C2E28"/>
        <rect x="19" y="12" width="1" height="1" fill="#96CDE6"/><rect x="19" y="13" width="1" height="1" fill="#96CDE6"/>
        <rect x="8"  y="15" width="1" height="1" fill="#F48C96"/><rect x="19" y="16" width="1" height="1" fill="#F48C96"/>
      </g>
      <g id="pocket">
        <rect x="13" y="20" width="1" height="1" fill="#7FBF4F"/><rect x="14" y="20" width="1" height="1" fill="#4E8A33"/>
        <rect x="11" y="21" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="21" width="4" height="1" fill="#EADBC6"/><rect x="16" y="21" width="1" height="1" fill="#5A4A3F"/>
        <rect x="11" y="22" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="22" width="4" height="1" fill="#EADBC6"/><rect x="16" y="22" width="1" height="1" fill="#5A4A3F"/>
      </g>
    </g>

    <!-- 前拷贝金星（在兔子前面，转到前半圈露出） -->
    <g id="starsFront">
      <g class="starF" id="s1f"><rect x="0" y="-1" width="1" height="1" fill="#E0AA28"/><rect x="-1" y="0" width="1" height="1" fill="#E0AA28"/><rect x="0" y="0" width="1" height="1" fill="#FFF4C2"/><rect x="1" y="0" width="1" height="1" fill="#E0AA28"/><rect x="0" y="1" width="1" height="1" fill="#E0AA28"/></g>
      <g class="starF" id="s2f"><rect x="0" y="-1" width="1" height="1" fill="#FFE48A"/><rect x="-1" y="0" width="1" height="1" fill="#FFE48A"/><rect x="0" y="0" width="1" height="1" fill="#FFF4C2"/><rect x="1" y="0" width="1" height="1" fill="#FFE48A"/><rect x="0" y="1" width="1" height="1" fill="#FFE48A"/></g>
      <g class="starF" id="s3f"><rect x="0" y="-1" width="1" height="1" fill="#E0AA28"/><rect x="-1" y="0" width="1" height="1" fill="#E0AA28"/><rect x="0" y="0" width="1" height="1" fill="#FFF4C2"/><rect x="1" y="0" width="1" height="1" fill="#E0AA28"/><rect x="0" y="1" width="1" height="1" fill="#E0AA28"/></g>
    </g>
  </g>
</svg>

<script>
  const ERROR_SPRITE = [
    "............................","............................","............................",
    "........OWWWO..OWWWO........","........OWPWO..OWPWO........","........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........","........OWPWO..OWPWO........","........OWWWO..OWWWO........",
    "........OWWWO..OWWWO........","......OOWWWWWWWWWWWWOO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......","......OWWWWWWWWWWWWWWO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......","......OWWWWWWWWWWWWWWO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......","......OOWWWWWWWWWWWWOO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWBBBBBBBBWWWO......","......OWWWWBBBBBBWWWWO......","......OOWWWWWWWWWWWWOO......",
    "........OWWWO..OWWWO........","........OOOOO..OOOOO........","............................","............................"
  ];
  const PALETTE = { O:"#5A4A3F", W:"#F5EFE4", P:"#F4A7B6", B:"#FFFBF4" };
  const SVGNS = "http://www.w3.org/2000/svg";
  function rect(x,y,fill){ const r=document.createElementNS(SVGNS,"rect");
    r.setAttribute("x",x); r.setAttribute("y",y); r.setAttribute("width",1); r.setAttribute("height",1); r.setAttribute("fill",fill); return r; }
  const body=document.getElementById("body"), gR=document.getElementById("ghostR"), gC=document.getElementById("ghostC");
  ERROR_SPRITE.forEach((row,y)=>{
    for(let x=0;x<row.length;x++){
      const c=row[x]; if(c==="."||!PALETTE[c]) continue;
      body.appendChild(rect(x,y,PALETTE[c]));      // 正常身体
      gR.appendChild(rect(x,y,"#FF3D5A"));         // 红剪影
      gC.appendChild(rect(x,y,"#3DE0FF"));         // 青剪影
    }
  });
</script>

</body>
</html>
