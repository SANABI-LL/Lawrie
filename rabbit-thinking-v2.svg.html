<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>my-pet · 像素兔 · thinking v2（灵光一现）</title>
<style>
  /*
    像素兔桌宠 · thinking v2（灵光一现·灯泡亮）
    ─────────────────────────────────────────────
    与 rabbit-thinking.svg.html（胡萝卜问号泡泡）并存，供对比。
    循环：琢磨(眼上瞟 + "..." 逐个冒) → 灯泡"叮"弹出亮起 + 睁圆眼惊喜 → 保持 → 重来。
    整像素、硬边、跳帧。
  */
  :root { --period: 4s; --pixel-size: 360px; --bg: #20283A; }

  html, body { margin: 0; min-height: 100vh; background: var(--bg); }
  body { display: grid; min-height: 100vh; place-items: center;
         font-family: "VT323", ui-monospace, monospace; }
  #stage { width: var(--pixel-size); height: var(--pixel-size);
           image-rendering: pixelated; shape-rendering: crispEdges; display: block; }

  #bunny { transform-box: fill-box; transform-origin: center bottom;
           animation: breathe 3.6s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.02)} }

  /* 思考相 / 灵光相 切换 */
  #eyesThink { animation: thinkPhase var(--period) infinite; }
  #eyesAha   { animation: ahaPhase   var(--period) infinite; }
  @keyframes thinkPhase { 0%,54.9%{opacity:1} 55%,100%{opacity:0} }
  @keyframes ahaPhase   { 0%,54.9%{opacity:0} 55%,100%{opacity:1} }

  /* "..." 逐个冒（思考相） */
  #dot1 { animation: d1 var(--period) infinite; }
  #dot2 { animation: d2 var(--period) infinite; }
  #dot3 { animation: d3 var(--period) infinite; }
  @keyframes d1 { 0%{opacity:0} 6%{opacity:1} 50%{opacity:1} 55%{opacity:0} 100%{opacity:0} }
  @keyframes d2 { 0%,16%{opacity:0} 22%{opacity:1} 50%{opacity:1} 55%{opacity:0} 100%{opacity:0} }
  @keyframes d3 { 0%,30%{opacity:0} 36%{opacity:1} 50%{opacity:1} 55%{opacity:0} 100%{opacity:0} }

  /* 灯泡"叮"弹出亮起（灵光相） */
  #bulbOn { transform-box: fill-box; transform-origin: center; animation: ahaBulb var(--period) infinite; }
  @keyframes ahaBulb {
    0%,54.9% { opacity:0; transform: scale(0.4); }
    55%      { opacity:1; transform: scale(1.25); }
    61%,100% { opacity:1; transform: scale(1); }
  }

  #hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
          font-size: 16px; color: #6E7DA8; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="hint">my-pet · 像素兔 · thinking v2（灵光一现）</div>

<svg id="stage" viewBox="0 0 28 28" role="img" aria-label="一只思考后灵光一现、头边灯泡亮起的像素兔桌宠" xmlns="http://www.w3.org/2000/svg">
  <rect id="shadow" x="8" y="26" width="12" height="1" fill="#000000" opacity="0.2"/>

  <g id="bunny">
    <g id="body"></g>

    <!-- 常驻：腮红 -->
    <rect x="8" y="15" width="1" height="1" fill="#F48C96"/><rect x="19" y="15" width="1" height="1" fill="#F48C96"/>

    <!-- 思考相：微挑眉 + 上瞟眼 + 小嘴 -->
    <g id="eyesThink">
      <rect x="10" y="11" width="2" height="1" fill="#3C2E28"/><rect x="15" y="11" width="2" height="1" fill="#3C2E28"/>
      <rect x="10" y="12" width="2" height="1" fill="#3C2E28"/><rect x="15" y="12" width="2" height="1" fill="#3C2E28"/>
      <rect x="13" y="16" width="2" height="1" fill="#D88A93"/>
    </g>
    <!-- 灵光相：睁圆眼 + 高光 + 小张嘴 -->
    <g id="eyesAha" opacity="0">
      <rect x="10" y="12" width="2" height="2" fill="#3C2E28"/><rect x="11" y="12" width="1" height="1" fill="#FFFFFF"/>
      <rect x="15" y="12" width="2" height="2" fill="#3C2E28"/><rect x="16" y="12" width="1" height="1" fill="#FFFFFF"/>
      <rect x="13" y="16" width="2" height="1" fill="#D88A93"/><rect x="13" y="17" width="2" height="1" fill="#E07E8C"/>
    </g>

    <!-- 口袋萝卜缨 -->
    <g id="pocket">
      <rect x="13" y="20" width="1" height="1" fill="#7FBF4F"/><rect x="14" y="20" width="1" height="1" fill="#4E8A33"/>
      <rect x="11" y="21" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="21" width="4" height="1" fill="#EADBC6"/><rect x="16" y="21" width="1" height="1" fill="#5A4A3F"/>
      <rect x="11" y="22" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="22" width="4" height="1" fill="#EADBC6"/><rect x="16" y="22" width="1" height="1" fill="#5A4A3F"/>
    </g>
  </g>

  <!-- 思考组：点点点 + 弹出的亮灯泡 -->
  <g id="think">
    <rect id="dot1" x="18" y="11" width="1" height="1" fill="#E8F0F8" opacity="0"/>
    <rect id="dot2" x="20" y="9"  width="1" height="1" fill="#E8F0F8" opacity="0"/>
    <rect id="dot3" x="21" y="7"  width="1" height="1" fill="#E8F0F8" opacity="0"/>

    <g id="bulbOn" opacity="0">
      <!-- 光芒 -->
      <rect x="20" y="1" width="1" height="1" fill="#FFD850"/><rect x="25" y="1" width="1" height="1" fill="#FFD850"/>
      <rect x="19" y="3" width="1" height="1" fill="#FFD850"/><rect x="26" y="3" width="1" height="1" fill="#FFD850"/>
      <rect x="20" y="5" width="1" height="1" fill="#FFD850"/><rect x="25" y="5" width="1" height="1" fill="#FFD850"/>
      <!-- 灯泡 -->
      <rect x="22" y="1" width="2" height="1" fill="#D9A934"/>
      <rect x="21" y="2" width="1" height="1" fill="#D9A934"/><rect x="22" y="2" width="2" height="1" fill="#FFE88C"/><rect x="24" y="2" width="1" height="1" fill="#D9A934"/>
      <rect x="21" y="3" width="1" height="1" fill="#D9A934"/><rect x="22" y="3" width="1" height="1" fill="#FFC43C"/><rect x="23" y="3" width="1" height="1" fill="#FFE88C"/><rect x="24" y="3" width="1" height="1" fill="#D9A934"/>
      <rect x="21" y="4" width="1" height="1" fill="#D9A934"/><rect x="22" y="4" width="2" height="1" fill="#FFE88C"/><rect x="24" y="4" width="1" height="1" fill="#D9A934"/>
      <rect x="22" y="5" width="2" height="1" fill="#D9A934"/>
      <rect x="22" y="6" width="2" height="1" fill="#968A78"/>
      <rect x="22" y="7" width="2" height="1" fill="#D9A934"/>
    </g>
  </g>
</svg>

<script>
  /* ─── 站立兔图谱（与其他状态一致）。28×28。 ─── */
  const THINK_SPRITE = [
    "............................",
    "............................",
    "............................",
    "........OWWWO..OWWWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWWWO..OWWWO........",
    "........OWWWO..OWWWO........",
    "......OOWWWWWWWWWWWWOO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OOWWWWWWWWWWWWOO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWBBBBBBBBWWWO......",
    "......OWWWWBBBBBBWWWWO......",
    "......OOWWWWWWWWWWWWOO......",
    "........OWWWO..OWWWO........",
    "........OOOOO..OOOOO........",
    "............................",
    "............................"
  ];
  const PALETTE = { O:"#5A4A3F", W:"#F5EFE4", P:"#F4A7B6", B:"#FFFBF4" };
  const SVGNS = "http://www.w3.org/2000/svg";
  const bodyG = document.getElementById("body");
  THINK_SPRITE.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const c = row[x];
      if (c === "." || !PALETTE[c]) continue;
      const r = document.createElementNS(SVGNS, "rect");
      r.setAttribute("x", x); r.setAttribute("y", y);
      r.setAttribute("width", 1); r.setAttribute("height", 1);
      r.setAttribute("fill", PALETTE[c]);
      bodyG.appendChild(r);
    }
  });
</script>

</body>
</html>
