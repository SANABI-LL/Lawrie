<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>my-pet · 像素兔 · notification</title>
<style>
  /*
    像素兔桌宠 · notification 状态（通知/警觉，B 类回归）——「通知优先」版
    ─────────────────────────────────────────────
    强调"叮·有消息·看我"，不是抖萝卜玩。纯兔子。
      · 两侧 ping 声波一圈圈往外扩（内→外，像通知 ping）
      · 头边醒目【放大的胡萝卜形 "!"】一闪一闪，抓眼提示
      · 兔子竖耳、睁圆眼盯着你、轻轻一顿
      · 萝卜安静揣兜里，只露出一点橙头（角色 motif）
    整像素、硬边、跳帧。
  */
  :root { --pixel-size: 360px; --bg: #20283A; --ping: 1.1s;
          --blink-min: 3000; --blink-max: 6000; --blink-frame: 110; }
  html, body { margin: 0; min-height: 100vh; background: var(--bg); }
  body { display: grid; min-height: 100vh; place-items: center;
         font-family: "VT323", ui-monospace, monospace; }
  #stage { width: var(--pixel-size); height: var(--pixel-size);
           image-rendering: pixelated; shape-rendering: crispEdges; display: block; }

  /* 兔子随 ping 轻轻一顿（盯你·不是蹦跶） */
  #bunny { transform-box: fill-box; transform-origin: center bottom;
           animation: perk var(--ping) ease-out infinite; }
  @keyframes perk { 0%{transform:translateY(0)} 8%{transform:translateY(-1px)} 22%,100%{transform:translateY(0)} }

  /* ping 声波：内圈先亮、外圈后亮 = 往外扩 */
  .wI { animation: pingI var(--ping) ease-out infinite; }
  .wO { animation: pingO var(--ping) ease-out infinite; }
  @keyframes pingI { 0%{opacity:0} 8%{opacity:1} 32%{opacity:0} 100%{opacity:0} }
  @keyframes pingO { 0%,18%{opacity:0} 28%{opacity:1} 52%{opacity:0} 100%{opacity:0} }

  /* 醒目"!"：一闪一闪（亮↔暗 + 微弹），抓眼提示「看这边」 */
  #carrotBang { transform-box: fill-box; transform-origin: center bottom;
                animation: flashBang 0.6s ease-in-out infinite; }
  @keyframes flashBang { 0%,100%{opacity:1; transform:scale(1.05)} 50%{opacity:0.15; transform:scale(0.85)} }

</style>
</head>
<body>


<svg id="stage" viewBox="0 0 28 28" role="img" aria-label="一只竖耳盯着你、两侧发出通知声波的像素兔桌宠" xmlns="http://www.w3.org/2000/svg">
  <rect id="shadow" x="8" y="26" width="12" height="1" fill="#000000" opacity="0.2"/>

  <!-- ping 声波（两侧，内外两圈往外扩） -->
  <g fill="#AED4F0">
    <g class="wI"><rect x="5" y="10" width="1" height="1"/><rect x="4" y="11" width="1" height="1"/><rect x="5" y="12" width="1" height="1"/></g>
    <g class="wO"><rect x="2" y="9" width="1" height="1"/><rect x="1" y="11" width="1" height="1"/><rect x="2" y="13" width="1" height="1"/></g>
    <g class="wI"><rect x="22" y="10" width="1" height="1"/><rect x="23" y="11" width="1" height="1"/><rect x="22" y="12" width="1" height="1"/></g>
    <g class="wO"><rect x="25" y="9" width="1" height="1"/><rect x="26" y="11" width="1" height="1"/><rect x="25" y="13" width="1" height="1"/></g>
  </g>

  <!-- 醒目胡萝卜形 "!"（头边，放大 + 一闪一闪） -->
  <g id="carrotBang">
    <rect x="21" y="0" width="1" height="1" fill="#4E8A33"/><rect x="22" y="0" width="1" height="1" fill="#7FBF4F"/><rect x="23" y="0" width="1" height="1" fill="#4E8A33"/>
    <rect x="21" y="1" width="1" height="1" fill="#F0913C"/><rect x="22" y="1" width="1" height="1" fill="#F0913C"/><rect x="23" y="1" width="1" height="1" fill="#C96A22"/>
    <rect x="21" y="2" width="1" height="1" fill="#F0913C"/><rect x="22" y="2" width="1" height="1" fill="#F0913C"/><rect x="23" y="2" width="1" height="1" fill="#C96A22"/>
    <rect x="21" y="3" width="1" height="1" fill="#F0913C"/><rect x="22" y="3" width="1" height="1" fill="#C96A22"/>
    <rect x="22" y="4" width="1" height="1" fill="#C96A22"/>
    <rect x="21" y="6" width="1" height="1" fill="#F0913C"/><rect x="22" y="6" width="1" height="1" fill="#C96A22"/>
  </g>

  <g id="bunny">
    <g id="body"></g>
    <g id="face">
      <g id="eyesOpen">
        <rect x="10" y="12" width="2" height="2" fill="#3C2E28"/><rect x="11" y="12" width="1" height="1" fill="#FFFFFF"/>
        <rect x="15" y="12" width="2" height="2" fill="#3C2E28"/><rect x="16" y="12" width="1" height="1" fill="#FFFFFF"/>
      </g>
      <g id="eyesClosed" style="display:none">
        <rect x="10" y="13" width="2" height="1" fill="#3C2E28"/><rect x="15" y="13" width="2" height="1" fill="#3C2E28"/>
      </g>
      <rect x="13" y="16" width="2" height="1" fill="#3C2E28"/>
      <rect x="8"  y="15" width="1" height="1" fill="#F48C96"/><rect x="19" y="15" width="1" height="1" fill="#F48C96"/>
    </g>
    <!-- 口袋里安静待着的萝卜：缨子 + 一点橙头露在前片上方（静止） -->
    <g id="pocketCarrot">
      <rect x="13" y="19" width="1" height="1" fill="#7FBF4F"/><rect x="14" y="19" width="1" height="1" fill="#4E8A33"/>   <!-- 缨子 -->
      <rect x="13" y="20" width="1" height="1" fill="#F0913C"/><rect x="14" y="20" width="1" height="1" fill="#C96A22"/>   <!-- 露出的橙头 -->
      <rect x="13" y="21" width="1" height="1" fill="#C96A22"/>                                                            <!-- 身(被前片遮) -->
    </g>
    <g id="pocketFlap">
      <rect x="11" y="21" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="21" width="4" height="1" fill="#EADBC6"/><rect x="16" y="21" width="1" height="1" fill="#5A4A3F"/>
      <rect x="11" y="22" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="22" width="4" height="1" fill="#EADBC6"/><rect x="16" y="22" width="1" height="1" fill="#5A4A3F"/>
    </g>
  </g>

</svg>

<script>
  const SPRITE = [
    "............................","............................","............................",
    "........OWWWO..OWWWO........","........OWPWO..OWPWO........","........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........","........OWPWO..OWPWO........","........OWWWO..OWWWO........",
    "........OWWWO..OWWWO........","......OOWWWWWWWWWWWWOO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......","......OWWWWWWWWWWWWWWO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......","......OWWWWWWWWWWWWWWO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......","......OOWWWWWWWWWWWWOO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWBBBBBBBBWWWO......","......OWWWWBBBBBBWWWWO......","......OOWWWWWWWWWWWWOO......",
    "........OWWWO..OWWWO........","........OOOOO..OOOOO........","............................","............................"
  ];
  const PALETTE = { O:"#5A4A3F", W:"#F5EFE4", P:"#F4A7B6", B:"#FFFBF4" };
  const SVGNS = "http://www.w3.org/2000/svg";
  const rect = (x,y,f) => { const r=document.createElementNS(SVGNS,"rect");
    r.setAttribute("x",x); r.setAttribute("y",y); r.setAttribute("width",1); r.setAttribute("height",1); r.setAttribute("fill",f); return r; };
  const bodyG = document.getElementById("body");
  SPRITE.forEach((row,y)=>{ for(let x=0;x<row.length;x++){ const c=row[x];
    if(c==="."||!PALETTE[c]) continue; bodyG.appendChild(rect(x,y,PALETTE[c])); } });

  // 眨眼（盯人状态少眨一点）
  const root=getComputedStyle(document.documentElement), num=k=>parseInt(root.getPropertyValue(k));
  const eo=document.getElementById("eyesOpen"), ec=document.getElementById("eyesClosed");
  function blink(){ eo.style.display="none"; ec.style.display="";
    setTimeout(()=>{ ec.style.display="none"; eo.style.display=""; }, num("--blink-frame")); }
  (function s(){ const g=num("--blink-min")+Math.random()*(num("--blink-max")-num("--blink-min"));
    setTimeout(()=>{ blink(); s(); }, g); })();

</script>

</body>
</html>
