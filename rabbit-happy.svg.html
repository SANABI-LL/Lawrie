<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>my-pet · 像素兔 · happy</title>
<style>
  /*
    像素兔桌宠 · happy 状态（蹦跳欢呼）
    ─────────────────────────────────────────────
    复用站立兔图谱（整只下移留头顶空间），叠加欢呼姿势 + 动效：
      · 双手举高欢呼 + 弯弯 ^^ 笑眼 + 小笑嘴(不张) + 浓腮红
      · 开心蹦跳：起跳拉伸 + 落地挤压；耳朵与头一体一起跳
      · 周围星星一闪一闪
      · 萝卜安静揣在口袋里
    整像素、硬边、跳帧。改 HAPPY_SPRITE 即改造型。
  */

  :root {
    --jump-period: 0.52s;
    --pixel-size: 360px;
    --bg: #20283A;
  }

  html, body { margin: 0; min-height: 100vh; background: var(--bg); }
  body { display: grid; min-height: 100vh; place-items: center;
         font-family: "VT323", "Press Start 2P", ui-monospace, monospace; }

  #stage {
    width: var(--pixel-size); height: var(--pixel-size);
    image-rendering: pixelated; shape-rendering: crispEdges; display: block;
  }

  /* 蹦跳：起跳拉伸 + 落地挤压（锚脚下） */
  #happy {
    transform-box: fill-box; transform-origin: center bottom;
    animation: jump var(--jump-period) ease-in-out infinite;
  }
  @keyframes jump {
    0%,100% { transform: translateY(0)    scaleY(0.97); }   /* 蹲/落地挤压 */
    40%,60% { transform: translateY(-2px) scaleY(1.04); }   /* 跳起拉伸 */
  }

  /* 阴影随蹦跳缩放 */
  #shadow { transform-box: fill-box; transform-origin: center;
            animation: shadowJump var(--jump-period) ease-in-out infinite; }
  @keyframes shadowJump {
    0%,100% { transform: scaleX(1);   opacity: 0.22; }
    50%     { transform: scaleX(0.7); opacity: 0.12; }
  }

  /* 星星一闪一闪 */
  .spark { transform-box: fill-box; transform-origin: center; }
  .s1 { animation: twinkle 1.4s infinite; }
  .s2 { animation: twinkle 1.4s infinite; animation-delay: 0.5s; }
  .s3 { animation: twinkle 1.4s infinite; animation-delay: 0.95s; }
  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.2)} 50%{opacity:1;transform:scale(1)} }

  #hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
          font-size: 16px; color: #6E7DA8; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="hint">my-pet · 像素兔 · happy（蹦跳欢呼）</div>

<svg id="stage" viewBox="0 0 28 28" role="img" aria-label="一只举手蹦跳欢呼的开心像素兔桌宠" xmlns="http://www.w3.org/2000/svg">
  <rect id="shadow" x="8" y="26" width="12" height="1" fill="#000000" opacity="0.22"/>

  <!-- 闪烁的星星 -->
  <g class="spark s1" fill="#FFE48A">
    <rect x="2" y="7" width="1" height="1"/><rect x="1" y="8" width="1" height="1"/><rect x="2" y="8" width="1" height="1"/><rect x="3" y="8" width="1" height="1"/><rect x="2" y="9" width="1" height="1"/>
  </g>
  <g class="spark s2" fill="#FFE48A">
    <rect x="25" y="6" width="1" height="1"/><rect x="24" y="7" width="1" height="1"/><rect x="25" y="7" width="1" height="1"/><rect x="26" y="7" width="1" height="1"/><rect x="25" y="8" width="1" height="1"/>
  </g>
  <g class="spark s3" fill="#FFE48A">
    <rect x="24" y="15" width="1" height="1"/><rect x="23" y="16" width="1" height="1"/><rect x="24" y="16" width="1" height="1"/><rect x="25" y="16" width="1" height="1"/><rect x="24" y="17" width="1" height="1"/>
  </g>

  <!-- 蹦跳欢呼的兔子（整体一起跳） -->
  <g id="happy">
    <g id="body"></g>

    <!-- 举高的双臂 + 爪子 -->
    <g id="arms">
      <!-- 左臂 -->
      <rect x="6" y="18" width="1" height="1" fill="#F5EFE4"/><rect x="5" y="18" width="1" height="1" fill="#5A4A3F"/>
      <rect x="5" y="17" width="1" height="1" fill="#F5EFE4"/><rect x="4" y="17" width="1" height="1" fill="#5A4A3F"/>
      <rect x="4" y="16" width="1" height="1" fill="#F5EFE4"/><rect x="3" y="16" width="1" height="1" fill="#5A4A3F"/>
      <rect x="4" y="15" width="1" height="1" fill="#F5EFE4"/><rect x="3" y="15" width="1" height="1" fill="#5A4A3F"/>
      <rect x="3" y="14" width="1" height="1" fill="#5A4A3F"/><rect x="4" y="14" width="1" height="1" fill="#5A4A3F"/>
      <rect x="2" y="13" width="1" height="1" fill="#5A4A3F"/><rect x="3" y="13" width="2" height="1" fill="#F5EFE4"/><rect x="5" y="13" width="1" height="1" fill="#5A4A3F"/>
      <rect x="2" y="12" width="1" height="1" fill="#5A4A3F"/><rect x="3" y="12" width="2" height="1" fill="#F5EFE4"/><rect x="5" y="12" width="1" height="1" fill="#5A4A3F"/>
      <rect x="3" y="11" width="2" height="1" fill="#5A4A3F"/>
      <!-- 右臂(镜像) -->
      <rect x="21" y="18" width="1" height="1" fill="#F5EFE4"/><rect x="22" y="18" width="1" height="1" fill="#5A4A3F"/>
      <rect x="22" y="17" width="1" height="1" fill="#F5EFE4"/><rect x="23" y="17" width="1" height="1" fill="#5A4A3F"/>
      <rect x="23" y="16" width="1" height="1" fill="#F5EFE4"/><rect x="24" y="16" width="1" height="1" fill="#5A4A3F"/>
      <rect x="23" y="15" width="1" height="1" fill="#F5EFE4"/><rect x="24" y="15" width="1" height="1" fill="#5A4A3F"/>
      <rect x="23" y="14" width="1" height="1" fill="#5A4A3F"/><rect x="24" y="14" width="1" height="1" fill="#5A4A3F"/>
      <rect x="22" y="13" width="1" height="1" fill="#5A4A3F"/><rect x="23" y="13" width="2" height="1" fill="#F5EFE4"/><rect x="25" y="13" width="1" height="1" fill="#5A4A3F"/>
      <rect x="22" y="12" width="1" height="1" fill="#5A4A3F"/><rect x="23" y="12" width="2" height="1" fill="#F5EFE4"/><rect x="25" y="12" width="1" height="1" fill="#5A4A3F"/>
      <rect x="23" y="11" width="2" height="1" fill="#5A4A3F"/>
    </g>

    <!-- 欢呼脸：弯弯 ^^ 笑眼 / 小鼻 / 小笑嘴(不张) / 浓腮红 -->
    <g id="face">
      <rect x="9"  y="14" width="1" height="1" fill="#3C2E28"/><rect x="10" y="13" width="2" height="1" fill="#3C2E28"/><rect x="12" y="14" width="1" height="1" fill="#3C2E28"/>
      <rect x="15" y="14" width="1" height="1" fill="#3C2E28"/><rect x="16" y="13" width="2" height="1" fill="#3C2E28"/><rect x="18" y="14" width="1" height="1" fill="#3C2E28"/>
      <rect x="12" y="16" width="1" height="1" fill="#D88A93"/><rect x="15" y="16" width="1" height="1" fill="#D88A93"/><rect x="13" y="17" width="2" height="1" fill="#D88A93"/>
      <rect x="8"  y="15" width="1" height="2" fill="#F48C96"/>
      <rect x="19" y="15" width="1" height="2" fill="#F48C96"/>
    </g>

    <!-- 口袋 + 萝卜缨 -->
    <g id="pocket">
      <rect x="13" y="20" width="1" height="1" fill="#7FBF4F"/><rect x="14" y="20" width="1" height="1" fill="#4E8A33"/>
      <rect x="11" y="21" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="21" width="4" height="1" fill="#EADBC6"/><rect x="16" y="21" width="1" height="1" fill="#5A4A3F"/>
      <rect x="11" y="22" width="1" height="1" fill="#5A4A3F"/><rect x="12" y="22" width="4" height="1" fill="#EADBC6"/><rect x="16" y="22" width="1" height="1" fill="#5A4A3F"/>
    </g>
  </g>
</svg>

<script>
  /* ─── 站立兔图谱（整只下移2行留头顶空间·肚子缩短）。眼/嘴/臂/腮红/口袋另叠。28×28。 ─── */
  const HAPPY_SPRITE = [
    "............................",
    "............................",
    "............................",
    "........OWWWO..OWWWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWWWO..OWWWO........",
    "........OWWWO..OWWWO........",
    "......OOWWWWWWWWWWWWOO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OOWWWWWWWWWWWWOO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWBBBBBBBBWWWO......",
    "......OWWWWBBBBBBWWWWO......",
    "......OOWWWWWWWWWWWWOO......",
    "........OWWWO..OWWWO........",
    "........OOOOO..OOOOO........",
    "............................",
    "............................"
  ];
  const PALETTE = { O:"#5A4A3F", W:"#F5EFE4", P:"#F4A7B6", B:"#FFFBF4" };

  const SVGNS = "http://www.w3.org/2000/svg";
  const bodyG = document.getElementById("body");
  HAPPY_SPRITE.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const c = row[x];
      if (c === "." || !PALETTE[c]) continue;
      const r = document.createElementNS(SVGNS, "rect");
      r.setAttribute("x", x); r.setAttribute("y", y);
      r.setAttribute("width", 1); r.setAttribute("height", 1);
      r.setAttribute("fill", PALETTE[c]);
      bodyG.appendChild(r);
    }
  });
</script>

</body>
</html>
