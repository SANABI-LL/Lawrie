<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>my-pet · 像素兔 · compacting</title>
<style>
  /*
    像素兔桌宠 · compacting 状态（打包压缩 · momentary 瞬时态）
    ─────────────────────────────────────────────
    设定：把面前一堆萝卜使劲压实，捆成一小捆萝卜干 —— 对应 Claude 的
    上下文压缩（PreCompact）：一堆内容 → 压紧 → 打包完成。
    分帧（JS 循环，类 idle 彩蛋的换帧手法）：
      堆着的萝卜 → 举爪 → 按压×2（身体下压 + 萝卜堆压扁）→ 捆好的包袱 ✨
    额头小汗珠：用力ing。文件内部循环；runtime momentary 5s 自动回 idle。
    整像素、硬边、跳帧。
  */

  :root {
    --pixel-size: 360px;
    --bg: #20283A;
  }

  html, body { margin: 0; min-height: 100vh; background: var(--bg); }
  body { display: grid; min-height: 100vh; place-items: center;
         font-family: "VT323", "Press Start 2P", ui-monospace, monospace; }

  #stage {
    width: var(--pixel-size); height: var(--pixel-size);
    image-rendering: pixelated; shape-rendering: crispEdges; display: block;
  }

  /* 身体下压由 JS 整像素瞬切，不用 CSS 动画 */
  #pet { transition: none; }

  /* 打包完成的小星星（默认隐身，防 delay 期间静帧残影） */
  #done .spark { transform-box: fill-box; transform-origin: center; opacity: 0; }
  #done .d1 { animation: twinkle 0.8s infinite; }
  #done .d2 { animation: twinkle 0.8s infinite; animation-delay: 0.3s; }
  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.2)} 50%{opacity:1;transform:scale(1)} }

  /* 汗珠：一滴一滴冒 */
  #sweat { animation: drip 1.6s infinite; }
  @keyframes drip {
    0%, 19.9%  { opacity: 0; transform: translateY(0); }
    20%, 54.9% { opacity: 1; transform: translateY(0); }
    55%, 89.9% { opacity: 1; transform: translateY(1px); }
    90%, 100%  { opacity: 0; transform: translateY(2px); }
  }

</style>
</head>
<body>


<svg id="stage" viewBox="0 0 28 28" role="img" aria-label="一只把一堆萝卜压实打包成萝卜干捆的像素兔" xmlns="http://www.w3.org/2000/svg">
  <rect id="shadow" x="8" y="27" width="12" height="1" fill="#000000" opacity="0.16"/>

  <g id="pet">
    <g id="body"></g>

    <!-- 专注的眼睛（标准圆眼，左上高光） -->
    <g id="eyes">
      <rect x="10" y="12" width="1" height="1" fill="#FFFFFF"/>
      <rect x="11" y="12" width="1" height="1" fill="#37291F"/>
      <rect x="10" y="13" width="1" height="1" fill="#37291F"/>
      <rect x="11" y="13" width="1" height="1" fill="#37291F"/>
      <rect x="16" y="12" width="1" height="1" fill="#FFFFFF"/>
      <rect x="17" y="12" width="1" height="1" fill="#37291F"/>
      <rect x="16" y="13" width="1" height="1" fill="#37291F"/>
      <rect x="17" y="13" width="1" height="1" fill="#37291F"/>
    </g>

    <!-- 用力的汗珠（头侧外缘） -->
    <g id="sweat">
      <rect x="22" y="9" width="1" height="1" fill="#AED4F0"/>
    </g>

    <!-- 举起准备压的双爪 -->
    <g id="armsUp" style="display:none">
      <rect x="9"  y="21" width="1" height="1" fill="#5A4A3F"/><rect x="10" y="21" width="2" height="1" fill="#F5EFE4"/>
      <rect x="16" y="21" width="2" height="1" fill="#F5EFE4"/><rect x="18" y="21" width="1" height="1" fill="#5A4A3F"/>
    </g>
    <!-- 按在堆上的双爪 -->
    <g id="armsDown" style="display:none">
      <rect x="9"  y="23" width="1" height="1" fill="#5A4A3F"/><rect x="10" y="23" width="2" height="1" fill="#F5EFE4"/>
      <rect x="16" y="23" width="2" height="1" fill="#F5EFE4"/><rect x="18" y="23" width="1" height="1" fill="#5A4A3F"/>
    </g>
  </g>

  <!-- 脚前地面上的萝卜堆（乱糟糟一摞，挡在脚前） -->
  <g id="pile">
    <rect x="12" y="23" width="1" height="1" fill="#7FBF4F"/><rect x="15" y="23" width="1" height="1" fill="#4E8A33"/>
    <rect x="10" y="24" width="1" height="1" fill="#F0913C"/><rect x="11" y="24" width="1" height="1" fill="#F0913C"/><rect x="12" y="24" width="1" height="1" fill="#C96A22"/>
    <rect x="14" y="24" width="1" height="1" fill="#F0913C"/><rect x="15" y="24" width="1" height="1" fill="#C96A22"/><rect x="16" y="24" width="1" height="1" fill="#F0913C"/>
    <rect x="9"  y="25" width="1" height="1" fill="#C96A22"/><rect x="10" y="25" width="1" height="1" fill="#F0913C"/><rect x="11" y="25" width="1" height="1" fill="#F0913C"/>
    <rect x="12" y="25" width="1" height="1" fill="#C96A22"/><rect x="13" y="25" width="1" height="1" fill="#F0913C"/><rect x="14" y="25" width="1" height="1" fill="#F0913C"/>
    <rect x="15" y="25" width="1" height="1" fill="#F0913C"/><rect x="16" y="25" width="1" height="1" fill="#C96A22"/><rect x="17" y="25" width="1" height="1" fill="#F0913C"/>
  </g>

  <!-- 压扁的萝卜堆 -->
  <g id="pileFlat" style="display:none">
    <rect x="11" y="24" width="1" height="1" fill="#7FBF4F"/>
    <rect x="9"  y="25" width="1" height="1" fill="#C96A22"/><rect x="10" y="25" width="2" height="1" fill="#F0913C"/>
    <rect x="12" y="25" width="1" height="1" fill="#C96A22"/><rect x="13" y="25" width="2" height="1" fill="#F0913C"/>
    <rect x="15" y="25" width="1" height="1" fill="#C96A22"/><rect x="16" y="25" width="2" height="1" fill="#F0913C"/>
  </g>

  <!-- 捆好的萝卜干砖：压实的橙色块 + 黄绳 + 星星（橙系才能从深棕脚部跳出来） -->
  <g id="done" style="display:none">
    <rect x="13" y="22" width="1" height="1" fill="#FFE082"/>
    <rect x="10" y="23" width="1" height="1" fill="#C96A22"/><rect x="11" y="23" width="2" height="1" fill="#F0913C"/><rect x="13" y="23" width="1" height="1" fill="#FFE082"/><rect x="14" y="23" width="2" height="1" fill="#F0913C"/><rect x="16" y="23" width="1" height="1" fill="#C96A22"/>
    <rect x="10" y="24" width="1" height="1" fill="#C96A22"/><rect x="11" y="24" width="2" height="1" fill="#F0913C"/><rect x="13" y="24" width="1" height="1" fill="#FFE082"/><rect x="14" y="24" width="2" height="1" fill="#F0913C"/><rect x="16" y="24" width="1" height="1" fill="#C96A22"/>
    <rect x="10" y="25" width="7" height="1" fill="#C96A22"/>
    <g class="spark d1" fill="#FFE082">
      <rect x="24" y="21" width="1" height="1"/><rect x="23" y="22" width="1" height="1"/><rect x="25" y="22" width="1" height="1"/><rect x="24" y="23" width="1" height="1"/>
    </g>
    <g class="spark d2" fill="#FFE082">
      <rect x="3" y="20" width="1" height="1"/><rect x="2" y="21" width="1" height="1"/><rect x="4" y="21" width="1" height="1"/><rect x="3" y="22" width="1" height="1"/>
    </g>
  </g>
</svg>

<script>
  /* ─── 站立兔图谱（同 idle 标准位）。28×28。 ─── */
  const SPRITE = [
    "............................",
    "........OWWWO..OWWWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWPWO..OWPWO........",
    "........OWWWO..OWWWO........",
    "........OWWWO..OWWWO........",
    "......OOWWWWWWWWWWWWOO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWWWWPPWWWWWWO......",
    "......OWPWWWWWWWWWWPWO......",
    "......OOWWWWWWWWWWWWOO......",
    "......OOWWWWWWWWWWWWOO......",
    "......OWWWWWWWWWWWWWWO......",
    "......OWWWBBBBBBBBWWWO......",
    "......OWWWBBBBBBBBWWWO......",
    "......OWWWBBBBBBBBWWWO......",
    "......OWWWWBBBBBBWWWWO......",
    "......OOWWWWWWWWWWWWOO......",
    "........OWWWO..OWWWO........",
    "........OWWWO..OWWWO........",
    "........OOOOO..OOOOO........",
    "............................"
  ];
  const PALETTE = { O:"#5A4A3F", W:"#F5EFE4", B:"#FFFBF4", P:"#F4A7B6" };

  const SVGNS = "http://www.w3.org/2000/svg";
  const bodyG = document.getElementById("body");
  SPRITE.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const c = row[x];
      if (c === "." || !PALETTE[c]) continue;
      const r = document.createElementNS(SVGNS, "rect");
      r.setAttribute("x", x); r.setAttribute("y", y);
      r.setAttribute("width", 1); r.setAttribute("height", 1);
      r.setAttribute("fill", PALETTE[c]);
      bodyG.appendChild(r);
    }
  });

  /* ── 压实打包分帧循环（换帧手法同 idle 彩蛋）── */
  const pet      = document.getElementById("pet");
  const pile     = document.getElementById("pile");
  const pileFlat = document.getElementById("pileFlat");
  const done     = document.getElementById("done");
  const armsUp   = document.getElementById("armsUp");
  const armsDown = document.getElementById("armsDown");
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const show = (el, on) => { el.style.display = on ? "" : "none"; };

  async function press() {
    pet.style.transform = "translateY(1px)";
    show(armsUp, false); show(armsDown, true);
    await sleep(300);
    pet.style.transform = "";
    show(armsDown, false); show(armsUp, true);
    await sleep(260);
  }

  (async function cycle() {
    for (;;) {
      // 1. 面对一堆萝卜
      show(pile, true); show(pileFlat, false); show(done, false);
      show(armsUp, false); show(armsDown, false);
      await sleep(650);
      // 2. 举爪
      show(armsUp, true);
      await sleep(380);
      // 3. 第一压：堆压扁
      await press();
      show(pile, false); show(pileFlat, true);
      // 4. 再压两下压实
      await press();
      await press();
      // 5. 打包完成 ✨
      show(armsUp, false); show(pileFlat, false); show(done, true);
      await sleep(1400);
    }
  })();
</script>

</body>
</html>
