<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>my-pet · 像素兔 · sleeping</title>
<style>
  /*
    像素兔桌宠 · sleeping 状态（A 类：循环，首=尾）
    ─────────────────────────────────────────────
    惬意趴睡：圆乎乎趴着不动、不露手脚、立耳、闭眼腮红。
      · 呼吸 = 从地面轻微鼓一下肚子（scaleY，身体不离地，不是整只上下跳）
      · 偶尔舔舔嘴唇（梦里回味萝卜）
      · 梦境泡泡形成动画：脑边冒小泡 → 变大扩散 → 大泡泡里浮现胡萝卜，循环
    保留配色 DNA（暖白毛 + 粉内耳 + 深可可眼）。改 SLEEP_SPRITE 即改造型。
  */

  :root {
    --breathe-period: 4s;
    --pixel-size: 360px;
    --bg: #161C2B;
  }

  html, body { margin: 0; min-height: 100vh; background: var(--bg); }
  body { display: grid; min-height: 100vh; place-items: center;
         font-family: "VT323", "Press Start 2P", ui-monospace, monospace; }

  #stage {
    width: var(--pixel-size); height: var(--pixel-size);
    image-rendering: pixelated; shape-rendering: crispEdges; display: block;
  }

  /* 呼吸：从地面往上轻微鼓肚子（身体不离地 → 不像起立坐下） */
  #breather {
    transform-box: fill-box;
    transform-origin: center bottom;
    animation: breathe var(--breathe-period) ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(1.05); }
  }

  /* ── 梦境泡泡形成：小泡渐显 → 大泡扩散 → 萝卜浮现，循环 ── */
  #dot1 { animation: d1 5.5s infinite; }
  #dot2 { animation: d2 5.5s infinite; }
  #bigBubble {
    transform-box: fill-box;
    transform-origin: 0% 100%;     /* 从近头一侧往外扩散 */
    animation: bigb 5.5s infinite;
  }
  #dreamCarrot { animation: dcar 5.5s infinite; }
  @keyframes d1 { 0%{opacity:0} 5%{opacity:1} 80%{opacity:1} 90%{opacity:0} 100%{opacity:0} }
  @keyframes d2 { 0%,12%{opacity:0} 18%{opacity:1} 80%{opacity:1} 90%{opacity:0} 100%{opacity:0} }
  @keyframes bigb {
    0%, 25%   { opacity:0; transform: scale(0.25); }
    44%       { opacity:1; transform: scale(1.08); }   /* 扩散 + 轻微过冲 */
    50%, 80%  { opacity:1; transform: scale(1); }
    90%, 100% { opacity:0; transform: scale(1); }
  }
  @keyframes dcar { 0%,48%{opacity:0} 58%{opacity:1} 80%{opacity:1} 90%,100%{opacity:0} }

  #hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
          font-size: 16px; color: #5C688C; letter-spacing: 1px; }
</style>
</head>
<body>

<div id="hint">my-pet · 像素兔 · sleeping（梦里都是萝卜）</div>

<svg id="stage" viewBox="0 0 28 28" role="img" aria-label="一只惬意趴着睡觉、梦见胡萝卜的像素兔桌宠" xmlns="http://www.w3.org/2000/svg">
  <rect id="shadow" x="2" y="24" width="22" height="1" fill="#000000" opacity="0.22"/>

  <!-- 会呼吸的整体（兔子 + 脸 + 舌头） -->
  <g id="breather">
    <g id="sleeperBody"></g>

    <!-- 脸（左下）：两条闭眼 + 鼻 + 腮红 -->
    <g id="face">
      <rect x="2" y="18" width="2" height="1" fill="#28201C"/>
      <rect x="5" y="18" width="2" height="1" fill="#28201C"/>
      <rect x="4" y="19" width="1" height="1" fill="#3C3028"/>
      <rect x="1" y="19" width="1" height="1" fill="#F4A7B6"/>
      <rect x="7" y="19" width="1" height="1" fill="#F4A7B6"/>
    </g>

    <!-- 舌头（舔嘴用，默认隐藏，JS 偶尔伸出） -->
    <rect id="tongue" x="3" y="20" width="2" height="1" fill="#EE9AAA" style="display:none"/>
  </g>

  <!-- 梦境泡泡（右上，形成动画） -->
  <g id="dream">
    <!-- 小泡（渐次冒出） -->
    <rect id="dot1" x="15" y="9" width="1" height="1" fill="#E8F0F8" opacity="0"/>
    <rect id="dot2" x="16" y="7" width="2" height="2" fill="#E8F0F8" opacity="0"/>

    <!-- 大泡（扩散） + 里面的胡萝卜 -->
    <g id="bigBubble" opacity="0">
      <!-- 填充 -->
      <rect x="20" y="3" width="4" height="1" fill="#E8F0F8"/>
      <rect x="18" y="4" width="8" height="1" fill="#E8F0F8"/>
      <rect x="18" y="5" width="8" height="1" fill="#E8F0F8"/>
      <rect x="20" y="6" width="4" height="1" fill="#E8F0F8"/>
      <!-- 描边 -->
      <rect x="20" y="2" width="4" height="1" fill="#B8CCE0"/>
      <rect x="18" y="3" width="2" height="1" fill="#B8CCE0"/><rect x="24" y="3" width="2" height="1" fill="#B8CCE0"/>
      <rect x="17" y="4" width="1" height="1" fill="#B8CCE0"/><rect x="26" y="4" width="1" height="1" fill="#B8CCE0"/>
      <rect x="17" y="5" width="1" height="1" fill="#B8CCE0"/><rect x="26" y="5" width="1" height="1" fill="#B8CCE0"/>
      <rect x="18" y="6" width="2" height="1" fill="#B8CCE0"/><rect x="24" y="6" width="2" height="1" fill="#B8CCE0"/>
      <rect x="20" y="7" width="4" height="1" fill="#B8CCE0"/>
      <!-- 萝卜（最后浮现） -->
      <g id="dreamCarrot" opacity="0">
        <rect x="21" y="3" width="1" height="1" fill="#7FBF4F"/><rect x="22" y="3" width="1" height="1" fill="#4E8A33"/>
        <rect x="20" y="4" width="1" height="1" fill="#F0913C"/><rect x="21" y="4" width="1" height="1" fill="#F0913C"/><rect x="22" y="4" width="1" height="1" fill="#C96A22"/>
        <rect x="21" y="5" width="1" height="1" fill="#F0913C"/><rect x="22" y="5" width="1" height="1" fill="#C96A22"/>
        <rect x="21" y="6" width="1" height="1" fill="#C96A22"/>
      </g>
    </g>
  </g>
</svg>

<script>
  /* ─── 惬意趴睡图谱（去手脚·圆底）：. 透明 / O 描边 / W 毛 / P 粉内耳。28×28。 ─── */
  const SLEEP_SPRITE = [
    "............................",
    "............................",
    "............................",
    "............................",
    ".....OWO..OWO...............",
    "....OWPWO.OWPWO.............",
    "....OWPWO.OWPWO.............",
    "....OWPWO.OWPWO.............",
    "....OWPWO.OWPWO.............",
    "....OWPWO.OWPWO...OOOO......",
    "....OWWWO.OWWWO.OOWWWWO.....",
    "....OWWWOOOWWWOOWWWWWWWO....",
    "...OWWWWWWWWWWWWWWWWWWWWO...",
    "..OWWWWWWWWWWWWWWWWWWWWWWO..",
    ".OWWWWWWWWWWWWWWWWWWWWWWWO..",
    ".OWWWWWWWWWWWWWWWWWWWWWWWO..",
    "OWWWWWWWWWWWWWWWWWWWWWWWWO..",
    "OWWWWWWWWWWWWWWWWWWWWWWWWO..",
    "OWWWWWWWWWWWWWWWWWWWWWWWWO..",
    ".OWWWWWWWWWWWWWWWWWWWWWWWO..",
    ".OWWWWWWWWWWWWWWWWWWWWWWO...",
    "..OWWWWWWWWWWWWWWWWWWWWO....",
    "...OWWWWWWWWWWWWWWWWWWO.....",
    ".....OWWWWWWWWWWWWWWO.......",
    "............................",
    "............................",
    "............................",
    "............................"
  ];
  const PALETTE = { O:"#5A4A3F", W:"#F5EFE4", P:"#F4A7B6" };

  const SVGNS = "http://www.w3.org/2000/svg";
  const bodyG = document.getElementById("sleeperBody");
  SLEEP_SPRITE.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const c = row[x];
      if (c === "." || !PALETTE[c]) continue;
      const r = document.createElementNS(SVGNS, "rect");
      r.setAttribute("x", x); r.setAttribute("y", y);
      r.setAttribute("width", 1); r.setAttribute("height", 1);
      r.setAttribute("fill", PALETTE[c]);
      bodyG.appendChild(r);
    }
  });

  // ── 偶尔舔舔嘴唇（梦里回味萝卜）：舌头快速伸两下 ──
  const tongue = document.getElementById("tongue");
  function lick() {
    const show = ms => { tongue.style.display = ""; setTimeout(() => tongue.style.display = "none", ms); };
    show(150);
    setTimeout(() => show(150), 270);
  }
  (function scheduleLick() {
    setTimeout(() => { lick(); scheduleLick(); }, 5000 + Math.random() * 5000);
  })();
</script>

</body>
</html>
