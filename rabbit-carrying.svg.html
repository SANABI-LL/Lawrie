<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>my-pet · 像素兔 · carrying</title>
<style>
  /*
    像素兔桌宠 · carrying 状态（扛起重任的团队大哥）
    ─────────────────────────────────────────────
    carrying = 罩得住全场的团队大哥；胡萝卜是它的武器。「有我在，稳。」
      · 仍是原来那只正脸兔（认得出）· 干净画面
      · 戴墨镜、左手举拳冲天、右手伸出举着【加长萝卜剑】、从容坏笑
      · 嘚瑟地左右晃+颠 + 墨镜白光沿框慢扫 + 剑身反光上扫·剑尖爆星
    整像素、硬边、跳帧。
  */
  :root { --pixel-size: 360px; --bg: #20283A; --swag: 1.1s; --bling: 1.6s; --shine: 4.5s; }
  html, body { margin: 0; min-height: 100vh; background: var(--bg); }
  body { display: grid; min-height: 100vh; place-items: center;
         font-family: "VT323", ui-monospace, monospace; }
  #stage { width: var(--pixel-size); height: var(--pixel-size);
           image-rendering: pixelated; shape-rendering: crispEdges; display: block; }

  /* 嘚瑟：臭屁地左右晃 + 一颠一颠 */
  #rig { transform-box: fill-box; transform-origin: center bottom;
         animation: swag var(--swag) ease-in-out infinite; }
  @keyframes swag {
    0%   { transform: translateY(0px) rotate(-2deg); }
    25%  { transform: translateY(-0.7px) rotate(0deg); }
    50%  { transform: translateY(0px) rotate(2deg); }
    75%  { transform: translateY(-0.7px) rotate(0deg); }
    100% { transform: translateY(0px) rotate(-2deg); }
  }

  /* 墨镜白光沿镜框慢慢横扫 */
  #glint { transform-box: fill-box; transform-origin: center;
           animation: glint var(--shine) ease-in-out infinite; }
  @keyframes glint {
    0%   { opacity:0; transform: translateX(0); }
    3%   { opacity:1; transform: translateX(0); }
    15%  { opacity:1; transform: translateX(6px); }
    19%  { opacity:0; transform: translateX(7px); }
    100% { opacity:0; transform: translateX(7px); }
  }

  /* 加长萝卜剑·剑身反光上扫 */
  #g0 { animation: g0 var(--bling) linear infinite; }
  #g1 { animation: g1 var(--bling) linear infinite; }
  #g2 { animation: g2 var(--bling) linear infinite; }
  @keyframes g0 { 0%,100%{opacity:0} 8%{opacity:1} 22%{opacity:0} }
  @keyframes g1 { 0%,100%{opacity:0} 18%{opacity:1} 32%{opacity:0} }
  @keyframes g2 { 0%,100%{opacity:0} 28%{opacity:1} 42%{opacity:0} }
  /* 剑尖爆星 */
  #tip { transform-box: fill-box; transform-origin: center;
         animation: tw var(--bling) ease-out infinite; }
  @keyframes tw { 0%,40%{opacity:0;transform:scale(0.4)} 50%{opacity:1;transform:scale(1.3)} 64%{opacity:0} 100%{opacity:0} }

</style>
</head>
<body>


<svg id="stage" viewBox="0 0 28 28" role="img" aria-label="原来那只正脸像素兔戴着墨镜、左手举拳冲天、右手举着长长的胡萝卜剑、嘚瑟地晃动的团队大哥" xmlns="http://www.w3.org/2000/svg">
  <ellipse id="shadow" cx="14" cy="26" rx="8" ry="1" fill="#000000" opacity="0.2"/>

  <g id="rig">
    <g id="base"></g>
    <rect id="g0" x="22" y="9" width="1" height="1" fill="#FFFFFF" opacity="0"/>
    <rect id="g1" x="22" y="6" width="1" height="1" fill="#FFFFFF" opacity="0"/>
    <rect id="g2" x="22" y="3" width="1" height="1" fill="#FFFFFF" opacity="0"/>
    <g id="tip"></g>
    <g id="glint"></g>
  </g>
</svg>

<script>
  const SVGNS = "http://www.w3.org/2000/svg";
  const PAL = { O:"#5A4A3F", W:"#F5EFE4", P:"#F4A7B6", B:"#FFFBF4",
                k:"#3C2E28", r:"#F48C96", C:"#F0913C", D:"#C96A22",
                g:"#7FBF4F", G:"#4E8A33", h:"#FFFFFF", y:"#FFE082",
                L:"#FFC078", X:"#1A1D28" };
  const rect = (x,y,f) => { const r=document.createElementNS(SVGNS,"rect");
    r.setAttribute("x",x); r.setAttribute("y",y); r.setAttribute("width",1); r.setAttribute("height",1); r.setAttribute("fill",f); return r; };
  const paintMap = (map,gp) => map.forEach((row,y)=>{ for(let x=0;x<row.length;x++){ const c=row[x];
    if(c==="."||!PAL[c]) continue; gp.appendChild(rect(x,y,PAL[c])); } });
  const paintList = (list,gp) => list.forEach(([x,y,c])=> gp.appendChild(rect(x,y,PAL[c])));

  // 墨镜·左拳冲天·右手举加长萝卜剑 的兔大哥（基底）
  const BASE = [
    "............................",".......................L....","......................LC....",
    "........OWWWO..OWWWO..LCD...","........OWPWO..OWPWO..LCD...","........OWPWO..OWPWO..LCD...",
    "...OOOO.OWPWO..OWPWO..LCD...","..OOWWOOOWPWO..OWPWO..LCD...","..OWWWWOOWWWO..OWWWO..LCD...",
    "..OWWWWOOWWWO..OWWWO..LCD...","..OOWWOOWWWWWWWWWWWWOOLCD...","...OOWWWWXXXWWXXXWWWWOLCD...",
    "....OOWWWXXXXXXXXWWWWOggG...",".....OOWWXXXWWXXXWWWWOWWO...","......OWWWWWWWWWWWWWWWWOO...",
    "......OWrWWWWWWkWrWWWWOO....","......OWWWWkkkkWWWWWWOO.....","......OWWWWWhhWWWWWWWO......",
    "......OWWWWWWWWWWWWWWO......","......OOWWWWWWWWWWWWOO......","......OWWWWWWWWWWWWWWO......",
    "......OWWWBBBBBBBBWWWO......","......OWWWWBBBBBBWWWWO......","......OOWWWWWWWWWWWWOO......",
    "........OWWWO..OWWWO........","........OOOOO..OOOOO........","............................","............................"
  ];
  const TIP = [[23,0,"h"],[22,0,"y"],[24,0,"y"],[22,1,"h"],[24,1,"h"]];
  const GLINT = [[9,13,"h"],[10,12,"h"],[11,11,"h"]];

  paintMap(BASE, document.getElementById("base"));
  paintList(TIP, document.getElementById("tip"));
  paintList(GLINT, document.getElementById("glint"));
</script>

</body>
</html>
